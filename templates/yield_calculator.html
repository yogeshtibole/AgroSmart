<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yield Calculator | AgroSmart</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='shared.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='yield_calculator.css') }}">
</head>
<body>
{% set active = 'yield' %}
{% include '_sidebar.html' %}
<div class="main">
  <p class="page-title">📈 Yield Calculator</p>
  <p class="page-sub">Estimate your crop yield based on farm conditions</p>

  <div class="yield-grid">
    <div class="card">
      <div class="card-title">🌾 <span data-lang="farm_params">Farm Parameters</span></div>

      <label class="form-label" data-lang="crop_type">Crop Type</label>
      <select class="form-select" id="cropType">
        <option value="wheat">Wheat</option><option value="rice">Rice</option>
        <option value="maize">Maize</option><option value="cotton">Cotton</option>
        <option value="soybean">Soybean</option><option value="sugarcane">Sugarcane</option>
      </select>

      <label class="form-label" data-lang="area_acres">Area (acres)</label>
      <input class="form-input" type="number" id="area" step="0.1" placeholder="e.g. 2.5" value="{{ user[3] if user and user[3] else '' }}">

      <label class="form-label" data-lang="soil_type">Soil Type</label>
      <select class="form-select" id="soilType">
        {% for st,val in [('Black Soil','black'),('Alluvial Soil','alluvial'),('Red Soil','red'),('Laterite Soil','laterite')] %}
          <option value="{{ val }}" {% if user and user[5]==st %}selected{% endif %}>{{ st }}</option>
        {% endfor %}
      </select>

      <label class="form-label" data-lang="water_rain">Water / Rain Condition</label>
      <select class="form-select" id="water">
        <option value="low">💧 Low (under 400mm)</option>
        <option value="moderate" selected>💧💧 Moderate (400–800mm)</option>
        <option value="high">💧💧💧 High (above 800mm)</option>
      </select>

      <button class="btn-green" onclick="calcYield()"><span data-lang="calc_yield">📊 Calculate Yield</span></button>
    </div>

    <div class="card" id="yieldResultCard">
      <div class="card-title">📊 <span data-lang="est_yield">Estimated Yield</span></div>
      <div class="yield-placeholder">
        <div style="font-size:48px;margin-bottom:12px">📈</div>
        <p style="color:var(--text-light);font-size:14px">Fill parameters and calculate</p>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='shared.js') }}"></script>
<script>
window.onload = function(){
  setNavUser("{{ user[0] if user and user[0] else '' }}", "{{ user[2] if user else '' }}");
};

var BASE = { wheat:20, rice:25, maize:22, cotton:18, soybean:16, sugarcane:300 };
var SOIL = { black:1.1, alluvial:1.2, red:0.9, laterite:0.8 };
var WATER= { low:0.8, moderate:1.0, high:1.1 };
var UNIT = { wheat:"quintals", rice:"quintals", maize:"quintals", cotton:"quintals", soybean:"quintals", sugarcane:"quintals" };

function calcYield(){
  var crop  = document.getElementById("cropType").value;
  var area  = parseFloat(document.getElementById("area").value);
  var soil  = document.getElementById("soilType").value;
  var water = document.getElementById("water").value;

  if(!area || area <= 0){ alert("Enter a valid farm area"); return; }

  var total = (area * BASE[crop] * SOIL[soil] * WATER[water]).toFixed(2);
  var min   = (total * 0.85).toFixed(1);
  var max   = (total * 1.15).toFixed(1);
  var price = { wheat:2000, rice:2100, maize:1600, cotton:6500, soybean:4000, sugarcane:280 };
  var revenue = (total * price[crop]).toFixed(0);

  var cropName = crop.charAt(0).toUpperCase() + crop.slice(1);
  document.getElementById("yieldResultCard").innerHTML =
    '<div class="card-title">📊 Estimated Yield</div>'+
    '<div class="yield-hero">'+
      '<div class="yield-number">'+total+'</div>'+
      '<div class="yield-unit">'+UNIT[crop]+' / season</div>'+
      '<div class="yield-range">Range: '+min+' – '+max+' '+UNIT[crop]+'</div>'+
    '</div>'+
    '<div class="yield-stats">'+
      '<div class="ystat"><span>'+cropName+'</span><small>Crop</small></div>'+
      '<div class="ystat"><span>'+area+' acres</span><small>Area</small></div>'+
      '<div class="ystat"><span>₹'+parseInt(revenue).toLocaleString('en-IN')+'</span><small>Est. Revenue</small></div>'+
    '</div>'+
    '<p class="yield-note">* Estimates based on average conditions. Actual yield may vary.</p>';
}
</script>
</body>
</html>
